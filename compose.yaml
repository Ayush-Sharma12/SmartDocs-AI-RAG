services:
  db:
    image: ankane/pgvector:latest
    container_name: smartdocs-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aidocs

    ports:
      - "5432:5432"

    volumes:
      - smartdocs_data:/var/lib/postgresql/data

volumes:
  smartdocs_data: